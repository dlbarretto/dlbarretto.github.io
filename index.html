<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title></title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap" rel="stylesheet">

  <style>
    html, body { height: 100%; margin: 0; }
    body {
      background: url('https://raw.githubusercontent.com/dlbarretto/dlbarretto.github.io/main/Portfolio/background.gif') center center / cover no-repeat fixed;
      background-color: #000;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
    }
    * { user-select: none; }

    .navbar { background-color: #000 !important; }
    .navbar .nav-link {
      font-family: 'Roboto', system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      font-weight: 700;
      color: #fff !important;
      padding: .5rem .9rem;
      border: none;             
      border-radius: .25rem;
      white-space: nowrap;
    }
    .navbar .nav-link:hover,
    .navbar .nav-link:focus { color: #fff !important; background-color: #111; }

    .nav-scroller {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .nav-scroller .navbar-nav {
      flex-wrap: nowrap;
      gap: .5rem;
    }

    .banner-wrap { width: 100%; background: #000; }
    .banner-img {
      width: 100%;
      height: 170px;              
      object-fit: cover;          
      object-position: center;    
      display: block;
    }

   
    .content-area { background-color: #1f1f1f; height: calc(100vh - 170px - 56px); }

    
    @media (max-width: 576px) {
      .banner-img { height: 140px; }
      .content-area { height: calc(100vh - 140px - 56px); }
    }
  </style>
</head>
<body>

  
  <nav class="navbar navbar-dark py-2">
    <div class="container-fluid px-3 nav-scroller">
      <ul class="navbar-nav flex-row mx-auto">
        <li class="nav-item"><a class="nav-link" href="javascript:void(0)">About</a></li>
        <li class="nav-item"><a class="nav-link" href="javascript:void(0)">Portfolio</a></li>
        <li class="nav-item"><a class="nav-link" href="javascript:void(0)">Collaborate</a></li>
        <li class="nav-item"><a class="nav-link" href="javascript:void(0)">Whisper</a></li>
      </ul>
    </div>
  </nav>

  
  <div class="banner-wrap">
    <img class="banner-img" alt="Landscape" src="https://raw.githubusercontent.com/dlbarretto/dlbarretto.github.io/597deb98e4572621af1bdc212c97d189a964f877/visuals/Landscape.jpg">
  </div>

 
  <div class="content-area"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
