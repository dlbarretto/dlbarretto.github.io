<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title></title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap" rel="stylesheet">

  <style>
    html, body { height: 100%; margin: 0; }
    body {
      background-color: #000;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
    }
    * { user-select: none; }

    .navbar { background-color: #000 !important; }
    .navbar .nav-link {
      font-family: 'Roboto', system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      font-weight: 700;
      color: #fff !important;
      padding: .5rem .9rem;
      border: none;
      border-radius: .25rem;
      white-space: nowrap;
      letter-spacing: .2px;
    }
    .navbar .nav-link:hover,
    .navbar .nav-link:focus { color: #fff !important; background-color: #111; }

    .navbar-toggler {
      border: 0 !important;
      box-shadow: none !important;
      outline: none !important;
    }

    .nav-scroller {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .nav-scroller .navbar-nav {
      flex-wrap: nowrap;
      gap: .5rem;
    }

    @media (min-width: 992px) {
      .nav-scroller .navbar-nav { gap: 1.1rem; }
      .navbar .nav-link { padding: .55rem 1.05rem; letter-spacing: .4px; }
    }

    @media (max-width: 576px) {
      .nav-scroller .navbar-nav { gap: .4rem; }
      .navbar .nav-link { padding: .45rem .7rem; font-size: .92rem; letter-spacing: .2px; }
    }

    main {
      height: calc(100vh - 56px);
      display: flex;
      flex-direction: column;
      width: 100%;
    }
    .top-blank { background-color: #fff; flex: 1; }
    .content-area { background-color: #1f1f1f; flex: 1; }
  </style>
</head>
<body>

  <nav class="navbar navbar-dark py-2">
    <div class="container-fluid px-3 d-flex align-items-center justify-content-center position-relative">
      <ul class="navbar-nav flex-row mx-auto nav-scroller">
        <li class="nav-item"><a class="nav-link" href="javascript:void(0)">About</a></li>
        <li class="nav-item"><a class="nav-link" href="javascript:void(0)">Portfolio</a></li>
        <li class="nav-item"><a class="nav-link" href="javascript:void(0)">Collaborate</a></li>
        <li class="nav-item"><a class="nav-link" href="javascript:void(0)">Whisper</a></li>
      </ul>

      <button class="navbar-toggler position-absolute end-0 me-2" type="button" aria-label="Settings">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>
  </nav>

  <main>
    <section class="top-blank"></section>
    <section class="content-area"></section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
