<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title></title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap" rel="stylesheet">

  <style>
    html, body { height: 100%; margin: 0; }
    body {
      background: url('https://raw.githubusercontent.com/dlbarretto/dlbarretto.github.io/main/Portfolio/background.gif') center center / cover no-repeat fixed;
      background-color: #000;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
    }
    * { user-select: none; }

    .navbar { background-color: #000 !important; }
    .navbar .nav-link {
      font-family: 'Roboto', system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      font-weight: 700;
      color: #fff !important;
      padding: .5rem .9rem;
      border: none;
      border-radius: .25rem;
      white-space: nowrap;
      transition: background-color .15s ease, color .15s ease;
      margin: 0 .35rem;                 
    }
    .navbar .nav-link:hover,
    .navbar .nav-link:focus {
      background-color: #8a2be2;        
      color: #fff !important;
    }
    .nav-scroller { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .nav-scroller .navbar-nav { flex-wrap: nowrap; gap: .25rem; }
    @media (min-width: 768px) {
      .nav-scroller .navbar-nav { gap: .9rem; }  
      .navbar .nav-link { margin: 0 .55rem; }
    }

    
    .settings-btn { border: none !important; outline: none; }
    .settings-btn .navbar-toggler-icon { filter: invert(1); }

    .banner-wrap { width: 100%; background: #000; }
    .banner-img {
      display: block;
      width: 100%;       
      height: auto;       
      max-height: 45vh;   
      object-fit: contain;
      object-position: center;
      background-color: #000; 
    }

   
    .content-area { background-color: #1f1f1f; height: calc(100vh - 56px - min(45vh, 100vh)); }
  </style>
</head>
<body>

 
  <nav class="navbar navbar-dark py-2">
    <div class="container-fluid px-3">
      <div class="nav-scroller flex-grow-1">
        <ul class="navbar-nav flex-row justify-content-center">
          <li class="nav-item"><a class="nav-link" href="javascript:void(0)">About</a></li>
          <li class="nav-item"><a class="nav-link" href="javascript:void(0)">Portfolio</a></li>
          <li class="nav-item"><a class="nav-link" href="javascript:void(0)">Collaborate</a></li>
          <li class="nav-item"><a class="nav-link" href="javascript:void(0)">Whisper</a></li>
        </ul>
      </div>
      <button class="navbar-toggler settings-btn ms-2" type="button" aria-label="Settings">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>
  </nav>

  
  <div class="banner-wrap">
    <img class="banner-img" alt="Landscape"
      src="https://raw.githubusercontent.com/dlbarretto/dlbarretto.github.io/597deb98e4572621af1bdc212c97d189a964f877/visuals/Landscape.jpg">
  </div>

  <div class="content-area"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
