<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Navigation Demo</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap" rel="stylesheet">

  <style>
    html, body { height: 100%; margin: 0; }
    body {
      background-color: #000;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
    }
    * { user-select: none; }

    .navbar { background-color: #000 !important; }
    .navbar .nav-link {
      font-family: 'Roboto', system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      font-weight: 700;
      color: #fff !important;
      padding: .5rem .9rem;
      border: none;
      border-radius: .25rem;
      white-space: nowrap;
      letter-spacing: .2px;
      margin: 0;
      transition: color 0.2s ease;
      font-size: 1rem;
    }
    .navbar .nav-link:hover,
    .navbar .nav-link:focus {
      color: #553C9A !important;
      background-color: transparent !important;
    }

    /* Light theme styles */
    body.light-theme .navbar { background-color: #fff !important; }
    body.light-theme .navbar .nav-link {
      color: #000 !important;
    }
    body.light-theme .navbar .nav-link:hover,
    body.light-theme .navbar .nav-link:focus {
      color: #553C9A !important;
    }
    body.light-theme .navbar-toggler-icon {
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='black' stroke-width='2' stroke-linecap='round' stroke-miterlimit='10' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
    }
    body.light-theme .navbar-toggler:hover .navbar-toggler-icon,
    body.light-theme .navbar-toggler:focus .navbar-toggler-icon,
    body.light-theme .navbar-toggler:active .navbar-toggler-icon {
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='%23553C9A' stroke-width='2' stroke-linecap='round' stroke-miterlimit='10' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
    }

    .nav-actions {
      display: flex;
      align-items: center;
      justify-content: end;
      gap: clamp(.5rem, 1.6vw, 2rem); 
      width: 100%;
    }
    .navbar-nav {
      flex: 1 1 auto;
      justify-content: space-evenly;             
      column-gap: clamp(.25rem, 2.5vw, 3rem); 
      row-gap: 0;
      max-width: min(100%, 40rem);              
    }

    .navbar-toggler {
      border: none !important;
      box-shadow: none !important;
      outline: none !important;
      background: none !important;
      margin-left: .5rem;
    }
    .navbar-toggler-icon {
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='white' stroke-width='2' stroke-linecap='round' stroke-miterlimit='10' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
    }
    .navbar-toggler:hover .navbar-toggler-icon,
    .navbar-toggler:focus .navbar-toggler-icon,
    .navbar-toggler:active .navbar-toggler-icon {
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='%23553C9A' stroke-width='2' stroke-linecap='round' stroke-miterlimit='10' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
    }


    .dropdown-menu { 
      min-width: 200px; 
      padding: .5rem .5rem;
    }
    .dropdown-row { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: .25rem 0; 
    }
    .dropdown-item-simple { 
      padding: .25rem 0; 
      color: #fff !important;
      transition: color 0.2s ease;
      cursor: default;
      pointer-events: none;
    }
    .dropdown-item-simple:hover,
    .dropdown-item-simple:focus {
      color: #4d20c9 !important;
    }
    .dropdown-header { 
      padding: .25rem 0; 
      margin: 0; 
    }
    .form-check-label {
      margin-right: .5rem !important;
      color: #fff !important;
      transition: color 0.2s ease;
      cursor: default;
      pointer-events: none;
    }
    .form-check-input:checked + .form-check-label,
    .form-check-input:focus + .form-check-label {
      color: #4d20c9 !important;
    }

    body.light-theme .dropdown-menu {
      background-color: #fff !important;
    }
    body.light-theme .form-check-label {
      color: #000 !important;
    }
    body.light-theme .dropdown-item-simple {
      color: #000 !important;
    }
    body.light-theme .dropdown-item-simple:hover,
    body.light-theme .dropdown-item-simple:focus {
      color: #4d20c9 !important;
    }
    body.light-theme .text-white-50 {
      color: #6c757d !important;
    }

    .theme-toggle {
      position: relative;
      width: 50px;
      height: 24px;
      background-color: #374151;
      border-radius: 12px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      border: none;
      outline: none;
    }
    
    .theme-toggle.active {
      background-color: #4d20c9;
    }
    
    .theme-toggle::before {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background-color: white;
      border-radius: 50%;
      transition: transform 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
    }
    
    .theme-toggle.active::before {
      transform: translateX(26px);
    }
    
    .theme-toggle:hover {
      background-color: #4B5563;
    }
    
    .theme-toggle.active:hover {
      background-color: #4d20c9;
    }

    .theme-toggle::before {
      content: '⚫';
    }
    
    .theme-toggle.active::before {
      content: '🌤️';
    }

    .sounds-toggle {
      position: relative;
      width: 50px;
      height: 24px;
      background-color: #374151;
      border-radius: 12px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      border: none;
      outline: none;
    }
    
    .sounds-toggle.active {
      background-color: #4d20c9;
    }
    
    .sounds-toggle::before {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background-color: white;
      border-radius: 50%;
      transition: transform 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
    }
    
    .sounds-toggle.active::before {
      transform: translateX(26px);
    }
    
    .sounds-toggle:hover {
      background-color: #4B5563;
    }
    
    .sounds-toggle.active:hover {
      background-color: #4d20c9;
    }

    .sounds-toggle::before {
      content: '🔇';
    }
    
    .sounds-toggle.active::before {
      content: '🔊';
    }

    .form-check-input:checked {
      background-color: #4d20c9 !important;
      border-color: #4d20c9 !important;
    }
    .form-check-input:focus {
      border-color: #4d20c9 !important;
      box-shadow: 0 0 0 0.25rem #4d20c9 !important;
    }

    main {
      height: calc(100vh - 56px);
      display: flex;
      flex-direction: column;
      width: 100%;
    }
  
    .top-blank { background-color: #fff; flex: 0.8; }
    .content-area { background-color: #1f1f1f; flex: 1.2; }

    
    body.light-theme .top-blank { background-color: #1f1f1f; }
    body.light-theme .content-area { background-color: #fff; }
  </style>
</head>
<body>

  <nav class="navbar navbar-dark py-2">
    <div class="container-fluid px-3 d-flex align-items-center">
      <div class="nav-actions">
        <ul class="navbar-nav flex-row flex-nowrap align-items-center m-0">
          <li class="nav-item"><a class="nav-link" href="javascript:void(0)">About</a></li>
          <li class="nav-item"><a class="nav-link" href="javascript:void(0)">Portfolio</a></li>
          <li class="nav-item"><a class="nav-link" href="javascript:void(0)">Collaborate</a></li>
          <li class="nav-item"><a class="nav-link" href="javascript:void(0)">Whisper</a></li>
        </ul>

        
        <div class="dropdown">
          <button class="navbar-toggler" type="button" id="settingsDropdown" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Settings">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="dropdown-menu dropdown-menu-end dropdown-menu-dark" aria-labelledby="settingsDropdown">
            <div class="dropdown-row">
              <span class="text-white-50">Settings</span>
            </div>

            <div class="dropdown-row">
              <span class="form-check-label">Appearance</span>
              <button class="theme-toggle" id="appearanceSwitch" aria-label="Toggle dark/light mode"></button>
            </div>

            <div class="dropdown-row">
              <label class="form-check-label" for="soundsSwitch">Sounds</label>
              <button class="sounds-toggle active" id="soundsSwitch" aria-label="Toggle sounds"></button>
            </div>

            <div class="dropdown-row">
              <span class="dropdown-item-simple">Background</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main>
    <section class="top-blank"></section>
    <section class="content-area"></section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    
    const themeToggle = document.getElementById('appearanceSwitch');
    
    themeToggle.addEventListener('click', function(e) {
      e.stopPropagation(); 
      this.classList.toggle('active');
      
      
      document.body.classList.toggle('light-theme');
      
     
      if (this.classList.contains('active')) {
        console.log('Light mode enabled');
      } else {
        console.log('Dark mode enabled');
      }
    });

    
    const soundsToggle = document.getElementById('soundsSwitch');
    
    soundsToggle.addEventListener('click', function(e) {
      e.stopPropagation(); 
      this.classList.toggle('active');
      
      
      if (this.classList.contains('active')) {
        console.log('Sounds enabled');
      } else {
        console.log('Sounds disabled');
      }
    });
  </script>
</body>
</html>
