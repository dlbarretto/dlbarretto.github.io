    .theme-toggle {
      position: relative;
      width: 50px;
      height: 24px;
      background-color: #374151;
      border-radius: 12px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      border: none;
      outline: none;
    }
    
    .theme-toggle.active {
      background-color: #4d20c9;
    }
    
    .theme-toggle::before {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background-color: white;
      border-radius: 50%;
      transition: transform 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
    }
    
    .theme-toggle.active::before {
      transform: translateX(26px);
    }
    
    .theme-toggle:hover {
      background-color: #4B5563;
    }
    
    .theme-toggle.active:hover {
      background-color: #4d20c9;
    }

    .theme-toggle::before {
      content: '⚫';
    }
    
    .theme-toggle.active::before {
      content: '🌤️';
    }

    .sounds-toggle {
      position: relative;

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const themeToggle = document.getElementById('appearanceSwitch');
    
    themeToggle.addEventListener('click', function(e) {
      e.stopPropagation();
      this.classList.toggle('active');
      
      document.body.classList.toggle('light-theme');
      
      if (this.classList.contains('active')) {
        console.log('Light mode enabled');
      } else {
        console.log('Dark mode enabled');
      }
    });

    const soundsToggle = document.getElementById('soundsSwitch');
    
    soundsToggle.addEventListener('click', function(e) {
      e.stopPropagation();
      this.classList.toggle('active');
      
      if (this.classList.contains('active')) {
        console.log('Sounds enabled');
      } else {
        console.log('Sounds disabled');
      }
    });

    const backgroundNumbers = document.querySelectorAll('.bg-number');
    const topBlank = document.querySelector('.top-blank');
    
    backgroundNumbers.forEach(number => {
      number.addEventListener('click', function(e) {
        e.stopPropagation();
        
        backgroundNumbers.forEach(n => n.classList.remove('active'));
        
        this.classList.add('active');
        
        const bgNumber = this.getAttribute('data-bg');
        
        topBlank.className = topBlank.className.replace(/bg-\d+/g, '');
        
        topBlank.classList.add(`bg-${bgNumber}`);
        
        console.log(`Background changed to: ${bgNumber}`);
      });
    });

    function updateResponsiveClasses() {
      const width = window.innerWidth;
      const navLinks = document.querySelectorAll('.nav-link');
      const navbarNav = document.querySelector('.navbar-nav');
      const topBlank = document.querySelector('.top-blank');
      const contentArea = document.querySelector('.content-area');

      navLinks.forEach(link => {
        link.className = link.className.replace(/nav-link-\w+/g, 'nav-link');
      });
      navbarNav.className = navbarNav.className.replace(/nav-gap-\w+/g, '');
      topBlank.className = topBlank.className.replace(/bg-\w+-\w+/g, '');
      contentArea.className = contentArea.className.replace(/bg-\w+-\w+/g, '');

      if (width <= 320) {
        navLinks.forEach(link => link.classList.add('nav-link-sm'));
        navbarNav.classList.add('nav-gap-sm');
        topBlank.classList.add('bg-mobile-sm');
        contentArea.classList.add('bg-mobile-lg');
      } else if (width <= 480) {
        navLinks.forEach(link => link.classList.add('nav-link-md'));
        navbarNav.classList.add('nav-gap-md');
        topBlank.classList.add('bg-mobile-sm');
        contentArea.classList.add('bg-mobile-lg');
      } else if (width <= 576) {
        navLinks.forEach(link => link.classList.add('nav-link-lg'));
        navbarNav.classList.add('nav-gap-lg');
        topBlank.classList.add('bg-mobile-sm');
        contentArea.classList.add('bg-mobile-lg');
      } else if (width <= 768) {
        navLinks.forEach(link => link.classList.add('nav-link-xl'));
        navbarNav.classList.add('nav-gap-xl');
        topBlank.classList.add('bg-mobile-sm');
        contentArea.classList.add('bg-mobile-lg');
      } else if (width <= 992) {
        navLinks.forEach(link => link.classList.add('nav-link-xxl'));
        navbarNav.classList.add('nav-gap-xxl');
        topBlank.classList.add('bg-desktop-sm');
        contentArea.classList.add('bg-desktop-lg');
      } else if (width <= 1200) {
        navLinks.forEach(link => link.classList.add('nav-link-xxxl'));
        navbarNav.classList.add('nav-gap-xxxl');
        topBlank.classList.add('bg-desktop-sm');
        contentArea.classList.add('bg-desktop-lg');
      } else if (width <= 1440) {
        navLinks.forEach(link => link.classList.add('nav-link-xxxl'));
        navbarNav.classList.add('nav-gap-4k');
        topBlank.classList.add('bg-desktop-sm');
        contentArea.classList.add('bg-desktop-lg');
      } else if (width <= 1920) {
        navLinks.forEach(link => link.classList.add('nav-link-4k'));
        navbarNav.classList.add('nav-gap-5k');
        topBlank.classList.add('bg-tv-sm');
        contentArea.classList.add('bg-tv-lg');
      } else {
        navLinks.forEach(link => link.classList.add('nav-link-5k'));
        navbarNav.classList.add('nav-gap-6k');
        topBlank.classList.add('bg-tv-sm');
        contentArea.classList.add('bg-tv-lg');
      }
    }

    updateResponsiveClasses();
    
    window.addEventListener('resize', updateResponsiveClasses);
  </script>
</body>
</html>
