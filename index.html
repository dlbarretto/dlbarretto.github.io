<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title></title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      background: url('https://raw.githubusercontent.com/dlbarretto/dlbarretto.github.io/main/Portfolio/background.gif') center center / cover no-repeat fixed;
      background-color: #000;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
    }
    * { user-select: none; }

    .page-bg { background-color: #bdbdbd; min-height: 100vh; }

    .stage { max-width: 920px; }

    .navbar { background-color: #000 !important; }
    .nav-btn { background-color: #000; border-color: #2b2b2b; color: #fff; }
    .nav-btn:hover, .nav-btn:focus { background-color: #111; color: #fff; }

    .banner {
      width: 100%;
      height: 140px;
      background-image: url('https://raw.githubusercontent.com/dlbarretto/dlbarretto.github.io/597deb98e4572621af1bdc212c97d189a964f877/visuals/Landscape.jpg');
      background-size: cover;
      background-position: center;
    }

    .content-area { background-color: #1f1f1f; height: 440px; }

    @media (max-width: 576px) {
      .banner { height: 120px; }
      .content-area { height: 520px; }
    }
  </style>
</head>
<body>
  <div class="page-bg d-flex justify-content-center align-items-start p-3 p-md-4">
    <div class="stage w-100">
      <nav class="navbar navbar-expand-md navbar-dark shadow-sm rounded-0">
        <div class="container-fluid px-3">
          <button class="navbar-toggler ms-auto border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse justify-content-center" id="mainNav">
            <ul class="navbar-nav align-items-center gap-2 my-2 my-md-0">
              <li class="nav-item"><a class="btn nav-btn btn-sm px-3 py-1" href="#about">About</a></li>
              <li class="nav-item"><a class="btn nav-btn btn-sm px-3 py-1" href="#portfolio">Portfolio</a></li>
              <li class="nav-item"><a class="btn nav-btn btn-sm px-3 py-1" href="#collaboration">Collaboration</a></li>
              <li class="nav-item"><a class="btn nav-btn btn-sm px-3 py-1" href="#whisper">Whisper</a></li>
            </ul>
          </div>
        </div>
      </nav>

      <div class="banner"></div>
      <div class="content-area"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
